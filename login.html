<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Birthday Mixer — Login</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="js/helpers.js"></script>
  <script defer src="js/auth.js"></script>
</head>
<body>
  <header class="header">
    <div class="logo">Birthday Mixer</div>
    <nav class="nav">
      <a href="index.html">Início</a>
      <a href="signup.html">Cadastrar</a>
    </nav>
  </header>

  <main class="container auth-container">
    <section class="card auth-card">
      <h2>Entrar</h2>
      <form id="loginForm" class="form">
        <div class="form-group">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" required>
        </div>
        <div class="form-group">
          <label for="password">Senha</label>
          <input id="password" name="password" type="password" required>
        </div>
        <div class="form-row">
          <button class="btn-primary" type="submit">Entrar</button>
        </div>
      </form>
      <div id="authMessage" class="message-box" aria-live="polite" hidden></div>
      <p class="muted">Use <strong>admin@mix.com / admin123</strong> para modo admin.</p>
    </section>
  </main>

  <footer class="footer">
    <small>© 2025 Birthday Mixer</small>
  </footer>
</body>
</html>
