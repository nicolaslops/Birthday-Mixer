<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Birthday Mixer — Cadastro</title>
    <link rel="stylesheet" href="../style/styles.css" />
    <script defer src="../scripts/helpers.js"></script>
    <script defer src="../scripts/auth.js"></script>
  </head>
  <body>
    <header class="header">
      <div class="logo">Birthday Mixer</div>
      <nav class="nav">
        <a href="../index.html">Início</a>
        <a href="login.html">Entrar</a>
      </nav>
    </header>

    <main class="container auth-container">
      <section class="card auth-card">
        <h2>Criar conta</h2>
        <form id="signupForm" class="form">
          <div class="form-group">
            <label for="name">Nome completo</label>
            <input id="name" name="name" type="text" required />
          </div>
          <div class="form-group">
            <label for="birthdate">Data de nascimento</label>
            <input id="birthdate" name="birthdate" type="date" required />
            <small class="muted">É necessário ter 16 anos ou mais.</small>
          </div>
          <div class="form-group">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" required />
          </div>
          <div class="form-group">
            <label for="password">Senha</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              minlength="6"
            />
          </div>
          <div class="form-row">
            <label class="checkbox">
              <input id="agree" type="checkbox" required />
              Declaro que tenho 16 anos ou mais.
            </label>
          </div>
          <div class="form-row">
            <button class="btn-primary" type="submit">Criar conta</button>
          </div>
        </form>
        <div
          id="authMessage"
          class="message-box"
          aria-live="polite"
          hidden
        ></div>
      </section>
    </main>

    <footer class="footer">
      <small>© 2025 Birthday Mixer</small>
    </footer>
  </body>
</html>
